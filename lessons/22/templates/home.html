<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Проект</title>
    <link rel="stylesheet" href="/static/css/home.css">
</head>
<body>

<!-- ═══════════ НАВИГАЦИЯ ═══════════ -->
<nav class="navbar">
    <div class="navbar-inner">
        <a href="home.html" class="navbar-brand">📋 Project Manager</a>
        <ul class="navbar-links">
            <li><a href="/home" class="active">Home</a></li>
            <li><a href="/tasks">Tasks</a></li>
            <li><a href="/create-task">Create Task</a></li>
        </ul>
    </div>
</nav>

<!-- ═══════════ КОНТЕНТ: HOME ═══════════ -->
<div class="container">
    <div class="page-header">
        <h1>👥 Клиенты</h1>
        <p>Список клиентов и их статус активности.</p>
    </div>

    <div class="card">
        <div class="card-header">
            📊 Таблица клиентов
        </div>
        <div class="card-body">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Created</th>
                    <th>Was Online</th>
                </tr>
                </thead>
                <tbody>
                    {{ range . }}
                        <tr>
                            <td><strong>{{ .Id }}</strong></td>
                            <td>{{ .Name }}</td>
                            <td>{{ .Created }}</td>
                            <td><span class="badge badge-success">{{ .WasOnline }}</span></td>
                        </tr>
                    {{ end }}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
